<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゲームセレクト</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", "Segoe UI", system-ui, sans-serif;
      background: #101217;
      color: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 18%, rgba(91, 177, 255, 0.16), transparent 24rem),
        radial-gradient(circle at 82% 74%, rgba(255, 207, 84, 0.13), transparent 22rem),
        #101217;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .shell {
      width: min(100%, 1080px);
      height: min(100vh - 32px, 720px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(11, 14, 20, 0.78);
    }

    .label {
      display: block;
      color: #9da8b8;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .value {
      display: block;
      margin-top: 4px;
      font-size: 1.16rem;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: #111923;
      box-shadow: 0 28px 82px rgba(0, 0, 0, 0.42);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: pointer;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(7, 10, 15, 0.75);
      backdrop-filter: blur(5px);
      transition: opacity 160ms ease;
      z-index: 2;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .menu {
      width: min(100%, 520px);
      display: grid;
      gap: 16px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4.7rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .sub {
      margin: 0;
      color: #c6cfdd;
      line-height: 1.65;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 13px 18px;
      font: inherit;
      font-weight: 850;
      color: #101217;
      background: #ffcf54;
      cursor: pointer;
      box-shadow: 0 12px 32px rgba(255, 207, 84, 0.24);
    }

    .mode-button {
      display: grid;
      gap: 6px;
      min-height: 108px;
      padding: 14px;
      text-align: left;
      color: #f5f7fb;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    .mode-button strong {
      font-size: 1.08rem;
    }

    .mode-button small {
      color: #c6cfdd;
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .controls {
      display: grid;
      gap: 8px;
      width: min(100%, 380px);
      justify-self: center;
      color: #c6cfdd;
      font-size: 0.9rem;
      line-height: 1.45;
      text-align: left;
    }

    .controls div {
      display: grid;
      grid-template-columns: 6em 1fr;
      gap: 10px;
      align-items: baseline;
    }

    .controls span {
      color: #f5f7fb;
      font-weight: 850;
    }

    button:focus-visible {
      outline: 3px solid #77bfff;
      outline-offset: 3px;
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .shell {
        height: calc(100vh - 20px);
        gap: 8px;
      }

      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .mode-grid {
        grid-template-columns: 1fr;
      }

      .stat {
        padding: 8px 10px;
      }

      .value {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hud" aria-label="ゲーム情報">
      <div class="stat">
        <span class="label">モード</span>
        <span class="value" id="modeLabel">選択中</span>
      </div>
      <div class="stat">
        <span class="label">スコア</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="label">最高記録</span>
        <span class="value" id="best">0</span>
      </div>
      <div class="stat">
        <span class="label" id="statALabel">体力</span>
        <span class="value" id="statA">-</span>
      </div>
      <div class="stat">
        <span class="label" id="statBLabel">状態</span>
        <span class="value" id="statB">-</span>
      </div>
    </section>

    <section class="stage" aria-label="ゲームステージ">
      <canvas id="game" width="960" height="540"></canvas>
      <div class="overlay" id="overlay">
        <div class="menu">
          <h1 id="menuTitle">ゲームセレクト</h1>
          <p class="sub" id="menuText">遊ぶゲームを選んでください。</p>
          <div class="mode-grid" id="modeGrid">
            <button class="mode-button" type="button" data-mode="shooting">
              <strong>シューティングゲーム</strong>
              <small>自機を動かして弾を避け、敵を撃ってスコアを伸ばす。</small>
            </button>
            <button class="mode-button" type="button" data-mode="action">
              <strong>2Dアクションゲーム</strong>
              <small>ジャンプと防御だけで進み、距離でスコアを競う。</small>
            </button>
          </div>
          <div class="controls" id="controls" aria-label="操作方法"></div>
          <button id="startButton" type="button" hidden>開始</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const menuTitle = document.getElementById("menuTitle");
    const menuText = document.getElementById("menuText");
    const modeGrid = document.getElementById("modeGrid");
    const controls = document.getElementById("controls");
    const startButton = document.getElementById("startButton");
    const modeLabel = document.getElementById("modeLabel");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const statALabel = document.getElementById("statALabel");
    const statA = document.getElementById("statA");
    const statBLabel = document.getElementById("statBLabel");
    const statB = document.getElementById("statB");

    const W = canvas.width;
    const H = canvas.height;
    const keys = new Set();
    const rand = (min, max) => min + Math.random() * (max - min);
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    let raf = 0;
    let last = 0;
    let activeMode = "select";
    let selectedMode = "";
    let playing = false;
    let pointerDown = false;
    let godMode = false;
    let secretFlash = 0;

    const best = {
      shooting: Number(localStorage.getItem("best-shooting") || 0),
      action: Number(localStorage.getItem("best-action") || 0)
    };

    const shooting = {
      player: { x: W / 2, y: H - 72, r: 12, lives: 3, bomb: 2, invuln: 0 },
      enemies: [],
      bullets: [],
      shots: [],
      pickups: [],
      sparks: [],
      score: 0,
      time: 0,
      phaseTime: 0,
      phase: 1,
      loop: 1,
      spawn: 0,
      shot: 0,
      shake: 0
    };

    const shootingPhases = [
      { name: "単発狙撃", duration: 18, spawn: 1.25, speed: 0.72 },
      { name: "ゆるい三連", duration: 18, spawn: 1.1, speed: 0.82 },
      { name: "扇状拡散", duration: 20, spawn: 0.92, speed: 0.94 },
      { name: "高速直線", duration: 20, spawn: 0.78, speed: 1.02 },
      { name: "交差包囲", duration: 22, spawn: 0.78, speed: 1.1 },
      { name: "最終波状", duration: 24, spawn: 0.66, speed: 1.18 }
    ];

    const action = {
      player: { x: 170, y: 376, w: 34, h: 54, vy: 0, life: 3, guard: 100, invuln: 0, onGround: true, guarding: false },
      obstacles: [],
      dust: [],
      clouds: [],
      score: 0,
      time: 0,
      speed: 285,
      spawn: 0,
      nextSpawn: 1,
      shake: 0,
      groundY: 430
    };

    for (let i = 0; i < 10; i += 1) {
      action.clouds.push({ x: Math.random() * W, y: rand(48, 190), w: rand(80, 170), v: rand(12, 34), a: rand(0.12, 0.28) });
    }

    function setMenuSelect() {
      activeMode = "select";
      selectedMode = "";
      playing = false;
      menuTitle.textContent = "ゲームセレクト";
      menuText.textContent = "遊ぶゲームを選んでください。";
      modeGrid.hidden = false;
      controls.innerHTML = "";
      startButton.hidden = true;
      overlay.classList.remove("hidden");
      updateHud();
    }

    function selectMode(mode) {
      selectedMode = mode;
      activeMode = mode;
      playing = false;
      modeGrid.hidden = true;
      startButton.hidden = false;
      startButton.textContent = "開始";
      if (mode === "shooting") {
        menuTitle.textContent = "シューティングゲーム";
        menuText.textContent = "6フェーズを突破して周回しよう。2周目以降は回復アイテムなしで続きます。";
        controls.innerHTML = "<div><span>移動</span>WASD / 矢印キー / ドラッグ</div><div><span>スペシャル</span>Q / ダブルタップ</div><div><span>戻る</span>Esc</div>";
      } else {
        menuTitle.textContent = "2Dアクションゲーム";
        menuText.textContent = "ジャンプと防御だけで障害物を突破し、進んだ距離でスコアを伸ばそう。";
        controls.innerHTML = "<div><span>ジャンプ</span>Space / ↑ / クリック</div><div><span>防御</span>Shift / ↓ / 長押し</div><div><span>戻る</span>Esc</div>";
      }
      updateHud();
    }

    function startSelectedMode() {
      if (selectedMode === "shooting") resetShooting();
      if (selectedMode === "action") resetAction();
    }

    function activateGodMode() {
      godMode = true;
      secretFlash = 2.4;
      menuTitle.textContent = "無敵モード解放";
      menuText.textContent = "隠しコマンド成功。ダメージを受けない状態になりました。";
      addSpark(shooting.sparks, W / 2, H / 2, "#ffcf54", 42);
      addSpark(action.dust, W / 2, H / 2, "#ffcf54", 42);
      updateHud();
    }

    function resetShooting() {
      activeMode = "shooting";
      playing = true;
      Object.assign(shooting.player, { x: W / 2, y: H - 72, r: 12, lives: 5, bomb: 2, invuln: 1.8 });
      shooting.enemies.length = 0;
      shooting.bullets.length = 0;
      shooting.shots.length = 0;
      shooting.pickups.length = 0;
      shooting.sparks.length = 0;
      shooting.score = 0;
      shooting.time = 0;
      shooting.phaseTime = 0;
      shooting.phase = 1;
      shooting.loop = 1;
      shooting.spawn = 0;
      shooting.shot = 0;
      shooting.shake = 0;
      overlay.classList.add("hidden");
      updateHud();
    }

    function resetAction() {
      activeMode = "action";
      playing = true;
      Object.assign(action.player, { x: 170, y: action.groundY - 54, w: 34, h: 54, vy: 0, life: 3, guard: 100, invuln: 1, onGround: true, guarding: false });
      action.obstacles.length = 0;
      action.dust.length = 0;
      action.score = 0;
      action.time = 0;
      action.speed = 285;
      action.spawn = 0;
      action.nextSpawn = 1;
      action.shake = 0;
      overlay.classList.add("hidden");
      updateHud();
    }

    function endGame() {
      playing = false;
      if (activeMode === "shooting") {
        best.shooting = Math.max(best.shooting, Math.floor(shooting.score));
        localStorage.setItem("best-shooting", String(best.shooting));
        menuTitle.textContent = "シューティングゲーム";
        menuText.textContent = `スコア ${Math.floor(shooting.score).toLocaleString("ja-JP")}`;
      } else if (activeMode === "action") {
        best.action = Math.max(best.action, Math.floor(action.score));
        localStorage.setItem("best-action", String(best.action));
        menuTitle.textContent = "2Dアクションゲーム";
        menuText.textContent = `記録 ${Math.floor(action.score).toLocaleString("ja-JP")}m`;
      }
      modeGrid.hidden = true;
      startButton.hidden = false;
      startButton.textContent = "リトライ";
      overlay.classList.remove("hidden");
      updateHud();
    }

    function addSpark(list, x, y, color, count) {
      for (let i = 0; i < count; i += 1) {
        list.push({ x, y, vx: rand(-130, 130), vy: rand(-150, 90), r: rand(2, 5), color, life: rand(0.25, 0.65), max: 0.65 });
      }
    }

    function useShootingBomb() {
      const s = shooting;
      if (!playing || activeMode !== "shooting" || s.player.bomb <= 0) return;
      s.player.bomb -= 1;
      s.bullets.length = 0;
      s.player.invuln = 1.8;
      s.score += 500;
      s.shake = 6;
      addSpark(s.sparks, s.player.x, s.player.y, "#77bfff", 28);
      updateHud();
    }

    function getShootingPhase() {
      return shootingPhases[shooting.phase - 1];
    }

    function spawnShootingPickup(type, x = W / 2, y = 90) {
      shooting.pickups.push({ type, x, y, vy: 95, r: type === "life" ? 13 : 11, age: 0 });
    }

    function spawnShootingPickupWave(count) {
      for (let i = 0; i < count; i += 1) {
        const type = i === 0 && shooting.phase % 2 === 0 ? "life" : "bomb";
        const x = 170 + (i / Math.max(1, count - 1)) * (W - 340) + rand(-24, 24);
        spawnShootingPickup(type, clamp(x, 90, W - 90), 70 - i * 14);
      }
    }

    function advanceShootingPhase() {
      const s = shooting;
      s.phaseTime = 0;
      s.spawn = 0;
      s.bullets.length = Math.floor(s.bullets.length * 0.35);
      s.enemies.length = Math.floor(s.enemies.length * 0.4);
      s.score += 800 + s.phase * 120;

      if (s.loop === 1) {
        spawnShootingPickupWave(s.phase >= shootingPhases.length ? 4 : 3);
      }

      if (s.phase >= shootingPhases.length) {
        s.phase = 1;
        s.loop += 1;
        s.score += 2500;
        s.player.invuln = Math.max(s.player.invuln, 1.8);
        addSpark(s.sparks, W / 2, 120, "#ffcf54", 36);
        return;
      }

      s.phase += 1;
      s.player.invuln = Math.max(s.player.invuln, 0.9);
      addSpark(s.sparks, W / 2, 120, "#77bfff", 24);
    }

    function spawnShootingEnemy() {
      const s = shooting;
      const phase = s.phase;
      const loopBoost = 1 + (s.loop - 1) * 0.08;
      const base = getShootingPhase();
      s.enemies.push({
        phase,
        x: rand(40, W - 40),
        y: -30,
        vx: rand(-34, 34) * loopBoost,
        vy: rand(54, 88) * base.speed * loopBoost,
        r: rand(18, 26),
        hp: 26 + phase * 4 + (s.loop - 1) * 8,
        fire: rand(0.35, 0.82),
        wave: rand(0, Math.PI * 2)
      });
    }

    function updateShootingPickups(dt) {
      const s = shooting;
      const p = s.player;
      for (let i = s.pickups.length - 1; i >= 0; i -= 1) {
        const item = s.pickups[i];
        item.age += dt;
        item.y += item.vy * dt;
        if (item.y > H + 30) {
          s.pickups.splice(i, 1);
          continue;
        }
        if (Math.hypot(item.x - p.x, item.y - p.y) < item.r + p.r + 16) {
          s.pickups.splice(i, 1);
          if (item.type === "life") {
            p.lives = Math.min(5, p.lives + 1);
          } else {
            p.bomb = Math.min(5, p.bomb + 1);
          }
          addSpark(s.sparks, item.x, item.y, item.type === "life" ? "#55d17a" : "#ffcf54", 14);
        }
      }
    }

    function addShootingBullet(x, y, angle, speed, r, color = "#77bfff") {
      shooting.bullets.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r,
        color
      });
    }

    function fireShootingPattern(enemy, aim, loopBoost) {
      const s = shooting;
      if (enemy.phase === 1) {
        addShootingBullet(enemy.x, enemy.y, aim, 125 * loopBoost, 5, "#8fd3ff");
        return;
      }

      if (enemy.phase === 2) {
        for (let j = -1; j <= 1; j += 1) {
          addShootingBullet(enemy.x, enemy.y, aim + j * 0.1, 140 * loopBoost, 5.5, "#8fd3ff");
        }
        return;
      }

      if (enemy.phase === 3) {
        for (let j = -2; j <= 2; j += 1) {
          addShootingBullet(enemy.x, enemy.y, aim + j * 0.18, 165 * loopBoost, 6, "#ffcf54");
        }
        return;
      }

      if (enemy.phase === 4) {
        for (let j = -1; j <= 1; j += 1) {
          addShootingBullet(enemy.x + j * 18, enemy.y, Math.PI / 2 + j * 0.06, 210 * loopBoost, 5.5, "#ff6b5f");
        }
        addShootingBullet(enemy.x, enemy.y, aim, 195 * loopBoost, 5.5, "#77bfff");
        return;
      }

      if (enemy.phase === 5) {
        for (let j = -2; j <= 2; j += 1) {
          addShootingBullet(enemy.x, enemy.y, aim + j * 0.2, 185 * loopBoost, 6, "#ffcf54");
          addShootingBullet(enemy.x, enemy.y, Math.PI - aim + j * 0.16, 145 * loopBoost, 5, "#8fd3ff");
        }
        return;
      }

      for (let j = -3; j <= 3; j += 1) {
        addShootingBullet(enemy.x, enemy.y, aim + j * 0.17, 205 * loopBoost, 6.5, "#ff6b5f");
      }
      for (let j = 0; j < 10; j += 1) {
        const angle = (Math.PI * 2 * j) / 10 + s.time * 0.45;
        addShootingBullet(enemy.x, enemy.y, angle, 128 * loopBoost, 5, "#77bfff");
      }
    }

    function updateShooting(dt) {
      const s = shooting;
      const p = s.player;
      const phaseInfo = getShootingPhase();
      const loopBoost = 1 + (s.loop - 1) * 0.08;
      s.time += dt;
      s.phaseTime += dt;
      s.score += dt * (12 + s.phase * 2 + s.loop * 3);
      if (s.phaseTime >= phaseInfo.duration) advanceShootingPhase();

      let dx = 0;
      let dy = 0;
      if (keys.has("ArrowLeft") || keys.has("a")) dx -= 1;
      if (keys.has("ArrowRight") || keys.has("d")) dx += 1;
      if (keys.has("ArrowUp") || keys.has("w")) dy -= 1;
      if (keys.has("ArrowDown") || keys.has("s")) dy += 1;
      const len = Math.hypot(dx, dy) || 1;
      p.x = clamp(p.x + (dx / len) * 330 * dt, 24, W - 24);
      p.y = clamp(p.y + (dy / len) * 330 * dt, 38, H - 24);

      s.shot -= dt;
      if (s.shot <= 0) {
        s.shot = 0.08;
        s.shots.push({ x: p.x - 8, y: p.y - 18, vy: -720, r: 3 });
        s.shots.push({ x: p.x + 8, y: p.y - 18, vy: -720, r: 3 });
      }

      s.spawn += dt;
      if (s.spawn >= Math.max(0.38, phaseInfo.spawn - (s.loop - 1) * 0.025)) {
        s.spawn = 0;
        spawnShootingEnemy();
      }

      for (let i = s.enemies.length - 1; i >= 0; i -= 1) {
        const e = s.enemies[i];
        e.wave += dt;
        if (e.phase === 4 || e.phase === 5) e.vx += Math.sin(e.wave * 2.6) * 18 * dt;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (e.x < 28 || e.x > W - 28) e.vx *= -1;
        e.fire -= dt;
        if (e.fire <= 0) {
          e.fire = rand(e.phase <= 2 ? 1.0 : 0.68, e.phase <= 2 ? 1.5 : 1.15) / loopBoost;
          const aim = Math.atan2(p.y - e.y, p.x - e.x);
          fireShootingPattern(e, aim, loopBoost);
        }
        if (e.y > H + 40) s.enemies.splice(i, 1);
      }

      for (let i = s.shots.length - 1; i >= 0; i -= 1) {
        const shot = s.shots[i];
        shot.y += shot.vy * dt;
        if (shot.y < -20) {
          s.shots.splice(i, 1);
          continue;
        }
        for (let j = s.enemies.length - 1; j >= 0; j -= 1) {
          const e = s.enemies[j];
          if (Math.hypot(shot.x - e.x, shot.y - e.y) < e.r + shot.r) {
            s.shots.splice(i, 1);
            e.hp -= 12;
            if (e.hp <= 0) {
              s.score += 180;
              addSpark(s.sparks, e.x, e.y, "#ffcf54", 14);
              s.enemies.splice(j, 1);
            }
            break;
          }
        }
      }

      for (let i = s.bullets.length - 1; i >= 0; i -= 1) {
        const b = s.bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        if (b.x < -40 || b.x > W + 40 || b.y < -40 || b.y > H + 40) {
          s.bullets.splice(i, 1);
          continue;
        }
        if (!godMode && p.invuln <= 0 && Math.hypot(b.x - p.x, b.y - p.y) < b.r + p.r) {
          s.bullets.splice(i, 1);
          p.lives -= 1;
          p.invuln = 1.8;
          s.shake = 12;
          addSpark(s.sparks, p.x, p.y, "#ff6b5f", 18);
          if (p.lives <= 0) endGame();
        }
      }

      updateShootingPickups(dt);
      updateParticles(s.sparks, dt);
      p.invuln = Math.max(0, p.invuln - dt);
      s.shake = Math.max(0, s.shake - dt * 28);
      best.shooting = Math.max(best.shooting, Math.floor(s.score));
      updateHud();
    }

    function jumpAction() {
      const a = action;
      const p = a.player;
      if (!playing || activeMode !== "action") return;
      if (p.onGround && !p.guarding) {
        p.vy = -630;
        p.onGround = false;
        addSpark(a.dust, p.x + p.w * 0.5, a.groundY, "#d8e1ee", 8);
      }
    }

    function spawnActionObstacle() {
      const a = action;
      const roll = Math.random();
      if (roll < 0.48) {
        a.obstacles.push({ type: "spike", x: W + 30, y: a.groundY - 34, w: 46, h: 34, passed: false });
      } else if (roll < 0.78) {
        a.obstacles.push({ type: "barrier", x: W + 30, y: a.groundY - 74, w: 34, h: 74, passed: false });
      } else {
        a.obstacles.push({ type: "bolt", x: W + 30, y: a.groundY - rand(125, 190), w: 58, h: 20, passed: false });
      }
    }

    function overlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function hitActionPlayer(obstacle) {
      const a = action;
      const p = a.player;
      if (p.invuln > 0) return;
      if (godMode) {
        obstacle.x = -100;
        addSpark(a.dust, p.x + p.w * 0.5, p.y + p.h * 0.5, "#ffcf54", 12);
        return;
      }
      if (p.guarding && p.guard > 0 && obstacle.type !== "spike") {
        p.guard = Math.max(0, p.guard - (obstacle.type === "barrier" ? 34 : 24));
        p.invuln = 0.38;
        obstacle.x = -100;
        a.shake = 5;
        addSpark(a.dust, p.x + p.w, p.y + p.h * 0.5, "#77bfff", 12);
        return;
      }
      p.life -= 1;
      p.invuln = 1.25;
      obstacle.x = -100;
      a.shake = 12;
      addSpark(a.dust, p.x + p.w * 0.5, p.y + p.h * 0.5, "#ff6b5f", 18);
      endGame();
    }

    function updateAction(dt) {
      const a = action;
      const p = a.player;
      a.time += dt;
      a.speed = 315 + Math.min(260, a.score * 0.09);
      a.score += (a.speed * dt) / 10;

      p.guarding = (keys.has("Shift") || keys.has("ArrowDown") || keys.has("s") || pointerDown) && p.onGround && p.guard > 0;
      p.guard = p.guarding ? Math.max(0, p.guard - 28 * dt) : Math.min(100, p.guard + 18 * dt);
      p.vy += 1800 * dt;
      p.y += p.vy * dt;
      if (p.y + p.h >= a.groundY) {
        p.y = a.groundY - p.h;
        p.vy = 0;
        p.onGround = true;
      } else {
        p.onGround = false;
      }

      a.spawn += dt;
      if (a.spawn >= a.nextSpawn) {
        a.spawn = 0;
        a.nextSpawn = rand(0.55, 1.05) - clamp(a.score / 1600, 0, 0.28);
        spawnActionObstacle();
        if (Math.random() < clamp(0.18 + a.score / 2200, 0.18, 0.48)) {
          spawnActionObstacle();
          a.obstacles[a.obstacles.length - 1].x += rand(110, 170);
        }
      }

      for (let i = a.obstacles.length - 1; i >= 0; i -= 1) {
        const o = a.obstacles[i];
        o.x -= a.speed * dt;
        if (!o.passed && o.x + o.w < p.x) {
          o.passed = true;
          a.score += 8;
        }
        if (o.x + o.w < -60) {
          a.obstacles.splice(i, 1);
          continue;
        }
        const hitbox = { x: p.x + 5, y: p.y + 4, w: p.w - 10, h: p.h - 8 };
        if (overlap(hitbox, o)) hitActionPlayer(o);
      }

      updateParticles(a.dust, dt);
      p.invuln = Math.max(0, p.invuln - dt);
      a.shake = Math.max(0, a.shake - dt * 28);
      best.action = Math.max(best.action, Math.floor(a.score));
      updateHud();
    }

    function updateParticles(list, dt) {
      for (let i = list.length - 1; i >= 0; i -= 1) {
        const p = list[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 420 * dt;
        p.life -= dt;
        if (p.life <= 0) list.splice(i, 1);
      }
    }

    function updateHud() {
      if (activeMode === "shooting") {
        modeLabel.textContent = "シューティング";
        scoreEl.textContent = Math.floor(shooting.score).toLocaleString("ja-JP");
        bestEl.textContent = Math.floor(best.shooting).toLocaleString("ja-JP");
        statALabel.textContent = "残機";
        statA.textContent = shooting.player.lives;
        statBLabel.textContent = godMode ? "状態" : "周回";
        statB.textContent = godMode ? "無敵" : `${shooting.loop}周 ${getShootingPhase().name} / S${shooting.player.bomb}`;
        return;
      }
      if (activeMode === "action") {
        modeLabel.textContent = "アクション";
        scoreEl.textContent = `${Math.floor(action.score).toLocaleString("ja-JP")}m`;
        bestEl.textContent = `${Math.floor(best.action).toLocaleString("ja-JP")}m`;
        statALabel.textContent = "ミス";
        statA.textContent = "1回で終了";
        statBLabel.textContent = godMode ? "状態" : "防御";
        statB.textContent = godMode ? "無敵" : `${Math.ceil(action.player.guard)}%`;
        return;
      }
      modeLabel.textContent = "選択中";
      scoreEl.textContent = "0";
      bestEl.textContent = "0";
      statALabel.textContent = "体力";
      statA.textContent = "-";
      statBLabel.textContent = "状態";
      statB.textContent = godMode ? "無敵" : "-";
    }

    function drawShooting(dt) {
      const s = shooting;
      ctx.fillStyle = "#0b1020";
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = "rgba(119, 191, 255, 0.12)";
      for (let y = (s.time * 80) % 70; y < H; y += 70) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      for (const shot of s.shots) {
        ctx.fillStyle = "#f5f7fb";
        ctx.fillRect(shot.x - 2, shot.y - 12, 4, 20);
      }

      for (const e of s.enemies) {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = "#ff6b5f";
        ctx.beginPath();
        ctx.arc(0, 0, e.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ffcf54";
        ctx.beginPath();
        ctx.arc(0, 0, e.r * 0.42, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      for (const b of s.bullets) {
        ctx.fillStyle = b.color || "#77bfff";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const item of s.pickups) {
        const pulse = 1 + Math.sin(item.age * 8) * 0.08;
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.scale(pulse, pulse);
        ctx.shadowColor = item.type === "life" ? "#55d17a" : "#ffcf54";
        ctx.shadowBlur = 18;
        ctx.fillStyle = item.type === "life" ? "#55d17a" : "#ffcf54";
        ctx.strokeStyle = "#f5f7fb";
        ctx.lineWidth = 3;
        if (item.type === "life") {
          ctx.beginPath();
          ctx.arc(0, 0, 17, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#101217";
          ctx.fillRect(-3, -10, 6, 20);
          ctx.fillRect(-10, -3, 20, 6);
        } else {
          ctx.beginPath();
          ctx.moveTo(0, -22);
          ctx.lineTo(18, 0);
          ctx.lineTo(0, 22);
          ctx.lineTo(-18, 0);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#101217";
          ctx.font = '900 18px "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif';
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("S", 0, 1);
        }
        ctx.restore();
      }

      const p = s.player;
      ctx.save();
      ctx.translate(p.x, p.y);
      if (p.invuln > 0 && Math.floor(s.time * 18) % 2 === 0) ctx.globalAlpha = 0.45;
      ctx.fillStyle = "#ffcf54";
      ctx.beginPath();
      ctx.moveTo(0, -20);
      ctx.lineTo(16, 17);
      ctx.lineTo(0, 9);
      ctx.lineTo(-16, 17);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#ff6b5f";
      ctx.beginPath();
      ctx.arc(0, 0, p.r * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      drawParticles(s.sparks);
    }

    function drawAction(dt) {
      const a = action;
      ctx.fillStyle = "#172436";
      ctx.fillRect(0, 0, W, H);
      for (const cloud of a.clouds) {
        cloud.x -= cloud.v * dt;
        if (cloud.x + cloud.w < -30) cloud.x = W + rand(30, 180);
        ctx.save();
        ctx.globalAlpha = cloud.a;
        ctx.fillStyle = "#f5f7fb";
        ctx.beginPath();
        ctx.roundRect(cloud.x, cloud.y, cloud.w, 22, 11);
        ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = "#1e4a43";
      ctx.fillRect(0, a.groundY, W, H - a.groundY);
      ctx.fillStyle = "#2c7562";
      ctx.fillRect(0, a.groundY, W, 9);

      for (const o of a.obstacles) {
        ctx.save();
        ctx.translate(o.x, o.y);
        if (o.type === "spike") {
          ctx.fillStyle = "#ff6b5f";
          ctx.beginPath();
          ctx.moveTo(0, o.h);
          ctx.lineTo(o.w * 0.5, 0);
          ctx.lineTo(o.w, o.h);
          ctx.closePath();
          ctx.fill();
        } else if (o.type === "barrier") {
          ctx.fillStyle = "#7c8b9f";
          ctx.fillRect(0, 0, o.w, o.h);
        } else {
          ctx.fillStyle = "#77bfff";
          ctx.beginPath();
          ctx.roundRect(0, 0, o.w, o.h, 10);
          ctx.fill();
        }
        ctx.restore();
      }

      const p = a.player;
      ctx.save();
      ctx.translate(p.x, p.y);
      if (p.invuln > 0 && Math.floor(a.time * 18) % 2 === 0) ctx.globalAlpha = 0.48;
      if (p.guarding) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = "#77bfff";
        ctx.beginPath();
        ctx.roundRect(-9, -7, p.w + 18, p.h + 14, 18);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = p.guarding ? "#8fd3ff" : "#ffcf54";
      ctx.beginPath();
      ctx.roundRect(0, 0, p.w, p.h, 8);
      ctx.fill();
      ctx.fillStyle = "#101217";
      ctx.fillRect(22, 12, 5, 5);
      ctx.restore();

      drawParticles(a.dust);
    }

    function drawParticles(list) {
      for (const p of list) {
        const alpha = clamp(p.life / p.max, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function draw(dt) {
      ctx.save();
      const shake = activeMode === "shooting" ? shooting.shake : activeMode === "action" ? action.shake : 0;
      if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));
      if (activeMode === "shooting") drawShooting(dt);
      else if (activeMode === "action") drawAction(dt);
      else {
        ctx.fillStyle = "#111923";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        ctx.font = '800 22px "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif';
        ctx.fillText("ゲームを選択してください", 36, 52);
      }
      if (secretFlash > 0) {
        const alpha = clamp(secretFlash / 2.4, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha * 0.32;
        ctx.fillStyle = "#ffcf54";
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = alpha;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#101217";
        ctx.font = '900 44px "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif';
        ctx.fillText("無敵モード", W / 2, H / 2 - 18);
        ctx.font = '800 20px "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif';
        ctx.fillText("発動", W / 2, H / 2 + 30);
        ctx.restore();
      }
      ctx.restore();
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000 || 0);
      last = now;
      if (playing && activeMode === "shooting") updateShooting(dt);
      if (playing && activeMode === "action") updateAction(dt);
      secretFlash = Math.max(0, secretFlash - dt);
      draw(dt);
      raf = requestAnimationFrame(loop);
    }

    modeGrid.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-mode]");
      if (!button) return;
      selectMode(button.dataset.mode);
    });

    startButton.addEventListener("click", startSelectedMode);

    window.addEventListener("keydown", (event) => {
      const key = event.key.length === 1 ? event.key.toLowerCase() : event.key;
      keys.add(key);
      if (!playing && (key === "x" || event.code === "KeyX")) {
        event.preventDefault();
        activateGodMode();
        return;
      }
      if (key === "Escape") {
        setMenuSelect();
        return;
      }
      if ((key === "Enter" || key === "r") && !playing && selectedMode) startSelectedMode();
      if (activeMode === "shooting" && key === "q") useShootingBomb();
      if (activeMode === "action" && (key === " " || key === "ArrowUp" || key === "w")) {
        event.preventDefault();
        jumpAction();
      }
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.length === 1 ? event.key.toLowerCase() : event.key;
      keys.delete(key);
    });

    canvas.addEventListener("pointerdown", (event) => {
      pointerDown = true;
      if (!playing) return;
      if (activeMode === "shooting") {
        const rect = canvas.getBoundingClientRect();
        shooting.player.x = ((event.clientX - rect.left) / rect.width) * W;
        shooting.player.y = ((event.clientY - rect.top) / rect.height) * H;
      }
      if (activeMode === "action") jumpAction();
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!playing || activeMode !== "shooting" || !pointerDown) return;
      const rect = canvas.getBoundingClientRect();
      shooting.player.x = clamp(((event.clientX - rect.left) / rect.width) * W, 24, W - 24);
      shooting.player.y = clamp(((event.clientY - rect.top) / rect.height) * H, 38, H - 24);
    });

    canvas.addEventListener("pointerup", () => {
      pointerDown = false;
    });

    canvas.addEventListener("pointerleave", () => {
      pointerDown = false;
    });

    setMenuSelect();
    raf = requestAnimationFrame((now) => {
      last = now;
      loop(now);
    });
  </script>
</body>
</html>
